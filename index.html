<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chit Fund Manager + Lottery Wheel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Chit Fund Manager + Lottery</h1>
        
        <div class="stats">
            <div class="stat-box">
                <h3>മൊത്തം അംഗങ്ങൾ</h3>
                <p id="totalMembers">0</p>
            </div>
            <div class="stat-box">
                <h3>മാസ അടവ്</h3>
                <p>₹<span id="monthlyAmount">5000</span></p>
            </div>
            <div class="stat-box">
                <h3>ഈ മാസം കിട്ടിയത്</h3>
                <p>₹<span id="collected">0</span></p>
            </div>
            <div class="stat-box">
                <h3>ഈ മാസത്തെ Winner</h3>
                <p id="currentWinner">-</p>
            </div>
        </div>

        <div class="card">
            <h2>🎡 Lottery Wheel - നറുക്കെടുപ്പ്</h2>
            <div class="wheel-container">
                <div class="pointer"></div>
                <canvas id="wheelCanvas" width="400" height="400"></canvas>
                <div id="winnerText"></div>
                <div class="flex">
                    <select id="wheelFilter">
                        <option value="all">എല്ലാവരും</option>
                        <option value="paid">Paid ആയവർ മാത്രം</option>
                        <option value="unpaid">Pending ഉള്ളവർ</option>
                    </select>
                    <button class="btn-success" id="spinBtn">SPIN - കറക്കുക</button>
                    <button id="saveWinnerBtn">Winner Save ചെയ്യുക</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Settings</h2>
            <div class="flex">
                <input type="number" id="chitAmount" placeholder="മാസ അടവ് തുക" value="5000">
                <button id="updateAmountBtn">Update തുക</button>
                <button id="resetMonthBtn">പുതിയ മാസം തുടങ്ങുക</button>
            </div>
        </div>

        <div class="card">
            <h2>പുതിയ അംഗം</h2>
            <div class="flex">
                <input type="text" id="memberName" placeholder="പേര്">
                <input type="text" id="memberPhone" placeholder="Phone Number">
                <button id="addMemberBtn">Add ചെയ്യുക</button>
            </div>
        </div>

        <div class="card">
            <h2>അംഗങ്ങളുടെ List</h2>
            <table id="memberTable">
                <thead>
                    <tr>
                        <th>പേര്</th>
                        <th>Phone</th>
                        <th>Status</th>
                        <th>Winner</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="memberBody"></tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
