<!DOCTYPE html>
<html lang="ml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mashood Kuri</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100vh; background: #0a1f1c; font-family: 'Segoe UI', Arial; color: #e0f2f1; overflow-x: hidden; }
    
    :root {
      --bg-dark: #0a1f1c;
      --card-bg: rgba(13, 45, 40, 0.7);
      --card-border: rgba(78, 205, 196, 0.3);
      --primary: #4ECDC4;
      --primary-glow: rgba(78, 205, 196, 0.5);
      --secondary: #FFD166;
      --text-light: #e0f2f1;
      --text-dim: #80cbc4;
      --danger: #FF6B6B;
      --success: #6BCF7F;
    }

    body { background: linear-gradient(135deg, #0a1f1c 0%, #0d2d28 50%, #0a1f1c 100%); background-attachment: fixed; }
    .container { max-width: 1400px; margin: 0 auto; padding: 15px; min-height: 100vh; }

    .card {
      background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--card-border);
      border-radius: 16px; padding: 20px; margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .btn { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; }
    .btn.primary { background: linear-gradient(135deg, var(--primary), #3ba99c); color: #0a1f1c; box-shadow: 0 4px 20px var(--primary-glow); }
    .btn.secondary { background: linear-gradient(135deg, var(--secondary), #ffb700); color: #0a1f1c; }
    .btn.danger { background: linear-gradient(135deg, var(--danger), #ff5252); color: white; }
    .btn.success { background: linear-gradient(135deg, var(--success), #4caf50); color: white; }
    .btn.small { width: auto; padding: 8px 16px; font-size: 14px; }

    input, select, textarea {
      width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--card-border);
      border-radius: 12px; font-size: 16px; background: rgba(10, 31, 28, 0.6);
      color: var(--text-light); backdrop-filter: blur(10px);
    }
    input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
    .hidden { display: none!important; }

    .top-bar {
      position: sticky; top: 0; background: rgba(10, 31, 28, 0.8); backdrop-filter: blur(20px);
      border: 1px solid var(--card-border); border-radius: 16px; padding: 12px 20px;
      margin-bottom: 20px; display: flex; align-items: center; gap: 15px; z-index: 100;
    }
    .profile-pic { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--primary); background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: bold; color: #0a1f1c; }
    .profile-info h3 { color: var(--primary); font-size: 18px; }
    .profile-info p { color: var(--text-dim); font-size: 12px; }
    .top-bar .btn-group { margin-left: auto; display: flex; gap: 10px; }
    .top-bar .btn { width: auto; padding: 8px 16px; margin: 0; }

    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
    .stat-card {
      background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--card-border);
      border-radius: 16px; padding: 20px; text-align: center; position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
    }
    .stat-card i { font-size: 28px; color: var(--primary); margin-bottom: 8px; filter: drop-shadow(0 0 10px var(--primary-glow)); }
    .stat-card h2 { font-size: 28px; color: var(--primary); margin: 5px 0; text-shadow: 0 0 20px var(--primary-glow); }
    .stat-card p { color: var(--text-dim); font-size: 12px; }

    .table-wrapper { overflow-x: auto; border-radius: 12px; }
    table { width: 100%; border-collapse: collapse; background: rgba(10, 31, 28, 0.4); }
    th { background: rgba(78, 205, 196, 0.15); color: var(--primary); padding: 14px; text-align: left; font-weight: 600; border-bottom: 2px solid var(--card-border); font-size: 14px; }
    td { padding: 14px; border-bottom: 1px solid rgba(78, 205, 196, 0.1); color: var(--text-light); font-size: 14px; }
    tr:hover { background: rgba(78, 205, 196, 0.05); }

    .badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge.paid { background: rgba(107, 207, 127, 0.2); color: var(--success); border: 1px solid var(--success); }
    .badge.pending { background: rgba(255, 107, 107, 0.2); color: var(--danger); border: 1px solid var(--danger); }

    .section-title {
      display: flex; align-items: center; gap: 10px; margin-bottom: 15px;
      color: var(--primary); font-size: 18px; font-weight: 600;
    }
    .section-title::before {
      content: ''; width: 4px; height: 20px; background: var(--primary);
      border-radius: 2px; box-shadow: 0 0 10px var(--primary-glow);
    }

    .main-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
    @media (min-width: 768px) {
      .main-grid { grid-template-columns: 2fr 1fr; }
      .stats-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .stat-card h2 { font-size: 24px; }
      .stat-card i { font-size: 24px; }
      table { font-size: 12px; }
      th, td { padding: 10px 8px; }
    }

    .secret-box { border: 2px dashed var(--secondary); background: rgba(255, 209, 102, 0.05); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
    .announcement-box textarea { min-height: 80px; resize: vertical; }

    .wheel-container { text-align: center; padding: 30px 0; }
    .wheel-box {
      width: 280px; height: 280px; margin: 20px auto; position: relative; border-radius: 50%;
      background: radial-gradient(circle, rgba(78,205,196,0.1), transparent);
      border: 3px solid var(--primary);
      box-shadow: 0 0 40px var(--primary-glow), inset 0 0 40px rgba(78,205,196,0.1);
      display: flex; align-items: center; justify-content: center;
    }
    .wheel-center { color: var(--primary); font-size: 24px; font-weight: bold; text-shadow: 0 0 20px var(--primary-glow); }
    .wheel-pointer {
      position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent;
      border-top: 25px solid var(--secondary); filter: drop-shadow(0 0 10px rgba(255, 209, 102, 0.8));
    }

    .modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8);
      z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .modal .card { max-width: 500px; width: 100%; }
  </style>
</head>
<body>
  <div id="app">
    <div class="container">
      <!-- Top Bar -->
      <div class="top-bar">
        <div class="profile-pic">MA</div>
        <div class="profile-info">
          <h3>Mashood Thennala</h3>
          <p>അഡ്മിനിസ്ട്രേറ്റർ പാനൽ</p>
        </div>
        <div class="btn-group">
          <button class="btn primary small" onclick="toggleLang()">EN / മലയാളം</button>
          <button class="btn secondary small" onclick="resetApp()">റ
