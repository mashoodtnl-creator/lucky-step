<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mashood ന്റെ കുറി</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; overflow-x: hidden; }
        body { 
            font-family: system-ui, sans-serif; 
            background: #0f172a; 
            color: #e2e8f0; 
            padding: 8px;
        }
  .container { width: 100%; max-width: 100%; margin: 0; }
        h1 { 
            text-align: center; 
            margin: 15px 0; 
            color: #fbbf24; 
            font-size: 22px; 
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.6);
        }
        h2 { font-size: 16px; margin-bottom: 10px; color: #cbd5e1; }
  .card { 
            background: #1e293b; 
            padding: 12px; 
            border-radius: 12px; 
            margin-bottom: 10px;
            border: 1px solid #334155;
        }
  .stats { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 8px; 
            margin-bottom: 10px; 
        }
  .stat-box { 
            background: #334155; 
            padding: 10px; 
            border-radius: 8px; 
            text-align: center; 
        }
  .stat-box h3 { color: #94a3b8; font-size: 10px; }
  .stat-box p { font-size: 17px; font-weight: bold; color: #22d3ee; margin-top: 4px; }
        input, button, select, textarea { 
            width: 100%;
            padding: 13px; 
            border-radius: 8px; 
            border: 1px solid #475569; 
            background: #334155; 
            color: #e2e8f0; 
            margin: 5px 0;
            font-size: 16px;
        }
        textarea { min-height: 100px; font-family: system-ui, sans-serif; }
        button { 
            background: #22c55e; 
            cursor: pointer; 
            border: none; 
            font-weight: 600;
        }
        button:active { background: #16a34a; transform: scale(0.98); }
        button:disabled { background: #475569; opacity: 0.5; cursor: not-allowed; }
  .btn-danger { background: #ef4444; }
  .btn-danger:active { background: #dc2626; }
  .btn-blue { background: #3b82f6; }
  .btn-blue:active { background: #2563eb; }
  .btn-yellow { background: #f59e0b; }
  .btn-yellow:active { background: #d97706; }
  .btn-purple { background: #8b5cf6; }
  .btn-purple:active { background: #7c3aed; }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 8px; 
            font-size: 12px;
        }
        th, td { 
            padding: 8px 4px; 
            text-align: left; 
            border-bottom: 1px solid #334155; 
        }
        th { background: #334155; color: #94a3b8; font-size: 11px; }
  .paid { color: #22c55e; font-weight: bold; }
  .unpaid { color: #f59e0b; }
  .winner { background: #14532d!important; }
  .winner-name { color: #fbbf24; font-weight: bold; }
  .eligible { background: #1e40af!important; }
  .wheel-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
        }
        #wheelCanvas {
            border: 3px solid #fbbf24;
            border-radius: 50%;
            background: #1e293b;
            width: 260px;
            height: 260px;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.4);
        }
  .pointer {
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 20px solid #ef4444;
            margin-bottom: -8px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        #winnerText {
            font-size: 18px;
            font-weight: bold;
            color: #fbbf24;
            min-height: 24px;
            text-align: center;
        }
   .small-btn {
            padding: 7px; 
            font-size: 12px;
            width: auto;
            margin: 2px;
        }
   .badge {
            background: #fbbf24;
            color: #0f172a;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
            margin-left: 5px;
        }
   .header-btns {
            position: fixed;
            top: 12px;
            right: 12px;
            display: flex;
            gap: 8px;
            z-index: 100;
        }
   .header-btn {
            width: auto;
            padding: 7px 10px;
            font-size: 18px;
            background: #334155;
        }
   .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }
   .login-box {
            background: #1e293b;
            padding: 30px 20px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            border: 2px solid #fbbf24;
        }
   .login-box h2 {
            text-align: center;
            color: #fbbf24;
            margin-bottom: 20px;
            font-size: 24px;
        }
   .user-badge {
            position: fixed;
            top: 12px;
            left: 12px;
            background: #334155;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 100;
        }
   .admin-badge { background: #ef4444; }
   .member-badge { background: #3b82f6; }
   .hidden { display: none!important; }
   .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: #334155;
            border-radius: 6px;
            margin: 4px 0;
        }
   .checkbox-row input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin: 0;
        }
   .info-text {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 5px;
            text-align: center;
        }
   .rules-display {
            background: #334155;
            padding: 15px;
            border-radius: 8px;
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 14px;
        }
   .tab-buttons {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }
   .tab-btn {
            flex: 1;
            padding: 10px;
            background: #334155;
            border: none;
            color: #94a3b8;
            border-radius: 8px;
            font-size: 14px;
        }
   .tab-btn.active {
            background: #3b82f6;
            color: #fff;
        }
   .btn-row {
            display: flex;
            gap: 5px;
        }
   .btn-row button {
            flex: 1;
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h2>🔐 Mashood ന്റെ കുറി</h2>
            <input type="password" id="loginPassword" placeholder="Password Enter ചെയ്യൂ">
            <button id="loginBtn" class="btn-blue">Login</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <div class="user-badge" id="userBadge"></div>
        <div class="header-btns">
            <button class="header-btn" id="soundToggle">🔊</button>
            <button class="header-btn btn-danger" id="logoutBtn">🚪</button>
        </div>
        
        <div class="container">
            <h1>Mashood ന്റെ കുറി 💰</h1>
            
            <div class="stats">
                <div class="stat-box">
                    <h3>മൊത്തം അംഗങ്ങൾ</h3>
                    <p id="totalMembers">0</p>
                </div>
                <div class="stat-box">
                    <h3>മാസ അടവ്</h3>
                    <p>₹<span id="monthlyAmount">5000</span></p>
                </div>
                <div class="stat-box">
                    <h3>ഈ മാസം കിട്ടിയത്</h3>
                    <p>₹<span id="collected">0</span></p>
                </div>
                <div class="stat-box">
                    <h3>Winner</h3>
                    <p id="currentWinner">-</p>
                </div>
            </div>

            <div class="tab-buttons admin-only">
                <button class="tab-btn active" id="mainTab">🎡 Main</button>
                <button class="tab-btn" id="rulesTab">📜 നിയമങ്ങൾ</button>
            </div>

            <div id="mainContent">
                <div class="card">
                    <h2>🎡 Lottery Wheel - നറുക്കെടുപ്പ്</h2>
                    <div class="wheel-container">
                        <div class="pointer"></div>
                        <canvas id="wheelCanvas" width="260" height="260"></canvas>
                        <div id="winnerText"></div>
                        <button id="spinBtn" class="admin-only">SPIN - കറക്കുക</button>
                        <button id="saveWinnerBtn" class="btn-blue admin-only">Winner Save ചെയ്യുക</button>
                        <p class="info-text member-only">Wheel കാണാൻ മാത്രം - Admin കറക്കും</p>
                        <p class="info-text admin-only" id="eligibleInfo">Eligible: എല്ലാവരും (Auto)</p>
                    </div>
                </div>

                <div class="card admin-only">
                    <h2>⚙️ Settings</h2>
                    <input type="number" id="chitAmount" placeholder="മാസ അടവ് തുക" value="5000">
                    <button id="updateAmountBtn" class="btn-blue">Update തുക</button>
                    <button id="resetMonthBtn" class="btn-danger">പുതിയ മാസം - Reset</button>
                </div>

                <div class="card admin-only">
                    <h2>➕ പുതിയ അംഗം</h2>
                    <input type="text" id="memberName" placeholder="പേര്">
                    <input type
