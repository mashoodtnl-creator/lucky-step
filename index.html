<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <title>ചിട്ടി മാനേജ്‌മെന്റ്</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>ചിട്ടി മാനേജ്‌മെന്റ്</h2>
        <input type="text" id="name" placeholder="അംഗത്തിന്റെ പേര്">
        <input type="number" id="amount" placeholder="തുക">
        <button onclick="addMember()">ചേർക്കുക</button>

        <table id="memberTable">
            <tr>
                <th>പേര്</th>
                <th>തുക</th>
            </tr>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
