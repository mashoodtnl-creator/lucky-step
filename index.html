<!DOCTYPE html>
<html lang="ml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MASHOOD KURI - Lucky Step</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans Malayalam', sans-serif; background: #f0f2f5; }
    .hidden { display: none !important; }
    #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0a4d2e, #0d6b3f); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .splash-content { text-align: center; color: white; }
    .splash-content h1 { font-size: 50px; margin-bottom: 10px; }
    .loader { border: 5px solid rgba(255,255,255,0.3); border-top: 5px solid white; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a4d2e, #0d6b3f); padding: 20px; }
    .login-box { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    .login-box h2 { text-align: center; color: #0a4d2e; margin-bottom: 20px; }
    .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
    .login-box button { width: 100%; padding: 12px; margin: 10px 0; background: #0a4d2e; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .login-box button:hover { background: #0d6b3f; }
    .link-btn { background: none !important; color: #0a4d2e !important; text-decoration: underline; }
    #adminPage { display: flex; min-height: 100vh; }
    .sidebar { width: 250px; background: #0a4d2e; color: white; padding: 20px 0; position: fixed; height: 100vh; overflow-y: auto; transition: 0.3s; z-index: 100; }
    .sidebar h2 { text-align: center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar a { display: flex; align-items: center; gap: 10px; padding: 15px 20px; color: white; text-decoration: none; transition: 0.3s; cursor: pointer; }
    .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.1); }
    .sidebar a i { font-size: 20px; }
    .main-content { margin-left: 250px; flex: 1; padding: 20px; }
    .top-bar { background: white; padding: 15px 20px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .menu-toggle { display: none; background: #0a4d2e; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .stat-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 15px; }
    .stat-card i { font-size: 40px; color: #0a4d2e; }
    .stat-card h2 { font-size: 30px; color: #0a4d2e; }
    .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .card h3 { color: #0a4d2e; margin-bottom: 15px; }
    .member-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
    .member-item:last-child { border-bottom: none; }
    .member-actions { display: flex; gap: 10px; }
    button.small { padding: 8px 15px; font-size: 14px; }
    button.danger { background: #e74c3c; }
    input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 2px solid #ddd; border-radius: 5px; font-size: 14px; }
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
    @media (max-width: 768px) {
      .sidebar { left: -250px; }
      .sidebar.active { left: 0; }
      .main-content { margin-left: 0; }
      .menu-toggle { display: block; }
    }
  </style>
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash">
    <div class="splash-content">
      <h1>MASHOOD KURI</h1>
      <p>Lucky Step</p>
      <div class="loader"></div>
    </div>
  </div>

  <!-- Main Container -->
  <div id="mainContainer" style="display:none;">
    
    <!-- Login Page -->
    <div id="loginPage" class="login-container">
      <div class="login-box">
        <h2>MASHOOD KURI</h2>
        <button onclick="showLogin('admin')">ADMIN LOGIN</button>
        <button onclick="showLogin('member')">MEMBER LOGIN</button>
      </div>
    </div>

    <!-- Admin Login Box -->
    <div id="adminLoginBox" class="login-container hidden">
      <div class="login-box">
        <h2>Admin Login</h2>
        <input type="password" id="adminPass" placeholder="Password">
        <button onclick="adminLogin()">Login</button>
        <button class="link-btn" onclick="backToLogin()">Back</button>
      </div>
    </div>

    <!-- Member Login Box -->
    <div id="memberLoginBox" class="login-container hidden">
      <div class="login-box">
        <h2>Member Login</h2>
        <input type="text" id="memberPhone" placeholder="Phone Number">
        <input type="password" id="memberPass" placeholder="Password">
        <button onclick="memberLogin()">Login</button>
        <button class="link-btn" onclick="showRegister()">New Register</button>
        <button class="link-btn" onclick="backToLogin()">Back</button>
      </div>
    </div>

    <div id="registerBox" class="login-container hidden">

        <h2>
