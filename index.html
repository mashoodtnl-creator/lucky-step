<!DOCTYPE html>
<html lang="ml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mashood Kuri</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100vh; background: #0a1f1c; font-family: 'Segoe UI', Arial; color: #e0f2f1; }
    
    :root {
      --card-bg: rgba(13, 45, 40, 0.7);
      --card-border: rgba(78, 205, 196, 0.3);
      --primary: #4ECDC4;
      --primary-glow: rgba(78, 205, 196, 0.5);
      --secondary: #FFD166;
      --text-light: #e0f2f1;
      --text-dim: #80cbc4;
      --danger: #FF6B6B;
      --success: #6BCF7F;
    }

    body { background: linear-gradient(135deg, #0a1f1c 0%, #0d2d28 50%, #0a1f1c 100%); background-attachment: fixed; padding: 15px; }
    .container { max-width: 1400px; margin: 0 auto; }

    .card {
      background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--card-border);
      border-radius: 16px; padding: 20px; margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .btn { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; }
    .btn.primary { background: linear-gradient(135deg, var(--primary), #3ba99c); color: #0a1f1c; box-shadow: 0 4px 20px var(--primary-glow); }
    .btn.secondary { background: linear-gradient(135deg, var(--secondary), #ffb700); color: #0a1f1c; }
    .btn.danger { background: linear-gradient(135deg, var(--danger), #ff5252); color: white; }
    .btn.success { background: linear-gradient(135deg, var(--success), #4caf50); color: white; }
    .btn.small { width: auto; padding: 8px 16px; font-size: 14px; }

    input, select, textarea {
      width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--card-border);
      border-radius: 12px; font-size: 16px; background: rgba(10, 31, 28, 0.6);
      color: var(--text-light); backdrop-filter: blur(10px);
    }
    input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 3px var(--primary-glow); }

    .top-bar {
      position: sticky; top: 0; background: rgba(10, 31, 28, 0.8); backdrop-filter: blur(20px);
      border: 1px solid var(--card-border); border-radius: 16px; padding: 12px 20px;
      margin-bottom: 20px; display: flex; align-items: center; gap: 15px; z-index: 100;
    }
    .profile-pic { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--primary); background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: bold; color: #0a1f1c; }
    .profile-info h3 { color: var(--primary); font-size: 18px; }
    .profile-info p { color: var(--text-dim); font-size: 12px; }
    .top-bar .btn-group { margin-left: auto; display: flex; gap: 10px; }
    .top-bar .btn { width: auto; padding: 8px 16px; margin: 0; }

    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
    .stat-card {
      background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--card-border);
      border-radius: 16px; padding: 20px; text-align: center; position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
    }
    .stat-card i { font-size: 28px; color: var(--primary); margin-bottom: 8px; filter: drop-shadow(0 0 10px var(--primary-glow)); }
    .stat-card h2 { font-size: 28px; color: var(--primary); margin: 5px 0; text-shadow: 0 0 20px var(--primary-glow); }
    .stat-card p { color: var(--text-dim); font-size: 12px; }

    .table-wrapper { overflow-x: auto; border-radius: 12px; }
    table { width: 100%; border-collapse: collapse; background: rgba(10, 31, 28, 0.4); }
    th { background: rgba(78, 205, 196, 0.15); color: var(--primary); padding: 14px; text-align: left; font-weight: 600; border-bottom: 2px solid var(--card-border); font-size: 14px; }
    td { padding: 14px; border-bottom: 1px solid rgba(78, 205, 196, 0.1); color: var(--text-light); font-size: 14px; }
    tr:hover { background: rgba(78, 205, 196, 0.05); }

    .badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge.paid { background: rgba(107, 207, 127, 0.2); color: var(--success); border: 1px solid var(--success); }
    .badge.pending { background: rgba(255, 107, 107, 0.2); color: var(--danger); border: 1px solid var(--danger); }

    .section-title {
      display: flex; align-items: center; gap: 10px; margin-bottom: 15px;
      color: var(--primary); font-size: 18px; font-weight: 600;
    }
    .section-title::before {
      content: ''; width: 4px; height: 20px; background: var(--primary);
      border-radius: 2px; box-shadow: 0 0 10px var(--primary-glow);
    }

    .modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8);
      z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .modal .card { max-width: 500px; width: 100%; }
    .hidden { display: none!important; }

    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .stat-card h2 { font-size: 24px; }
      table { font-size: 12px; }
      th, td { padding: 10px 8px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Top Bar -->
    <div class="top-bar">
      <div class="profile-pic">MA</div>
      <div class="profile-info">
        <h3>Mashood Thennala</h3>
        <p>അഡ്മിനിസ്ട്രേറ്റർ പാനൽ</p>
      </div>
      <div class="btn-group">
        <button class="btn primary small" onclick="resetApp()">റീസെറ്റ്</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <i class="ri-group-fill"></i>
        <div>
          <h2 id="totalMembers">0</h2>
          <p>ആകെ മെമ്പർമാർ</p>
        </div>
      </div>
      <div class="stat-card">
        <i class="ri-money-rupee-circle-fill"></i>
        <div>
          <h2 id="totalCollection">₹0</h2>
          <p>ആകെ കളക്ഷൻ</p>
        </div>
      <div class="stat-card">
        <i class="ri-checkbox-circle-fill"></i>
        <div>
          <h2 id="paidMembers">0</h2>
          <p>ഇനി അടച്ചവർ</p>
        </div>
      </div>
      <div class="stat-card">
        <i class="ri-time-fill"></i>
        <div>
          <h2 id="pendingMembers">0</h2>
          <p>ബാക്കി നിൽക്കുന്നവർ</p>
        </div>
      </div>
    </div>

    <!-- Member Table -->
    <div class="card">
      <div class="section-title">
        <i class="ri-file-list-3-line"></i>
        <span>കുറി ഗ്രൂപ്പ് വിവരങ്ങൾ</span>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Mobile</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="membersTable"></tbody>
        </table>
      </div>
      <button class="btn primary" onclick="showAddMember()" style="margin-top:15px;">+ Add Member</button>
    </div>
  </div>

  <!-- Add Member Modal -->
  <div id="addMemberModal" class="modal hidden">
    <div class="card">
      <h3 style="color:var(--primary); margin-bottom:15px;">Add New Member</h3>
      <input type="text" id="newMemName" placeholder="Name">
      <input type="tel" id="newMemPhone" placeholder="Phone">
      <input type="number" id="newMemAmount" placeholder="Amount" value="10000">
      <div style="display:flex; gap:10px; margin-top:15px;">
        <button class="btn primary" onclick="addMember()">Save</button>
        <button class="btn danger" onclick="closeAddMember()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    let db = JSON.parse(localStorage.getItem('mashoodKuriDB')) || {
      members: [
        {id:1001, name:'Ramesh Kumar', phone:'9876543210', amount:10000, paid:true},
        {id:1002, name:'Suresh P.', phone:'9876543211', amount:10000, paid:false}
      ],
      nextId: 1003
    };

    // AUTO INIT
    (function init() {
      updateStats();
      renderTable();
    })();

    function saveDB() { localStorage.setItem('mashoodKuriDB', JSON.stringify(db)); }

    function updateStats() {
      const total = db.members.length;
      const paid = db.members.filter(m => m.paid).length;
      const pending = total - paid;
      const collection = db.members.filter(m => m.paid).reduce((s,m) => s+m.amount, 0);
      
      document.getElementById('totalMembers').textContent = total;
      document.getElementById('totalCollection').textContent = '₹' + collection.toLocaleString();
      document.getElementById('paidMembers').textContent = paid;
      document.getElementById('pendingMembers').textContent = pending;
    }

    function renderTable() {
      const tbody = document.getElementById('membersTable');
      if(db.members.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:20px;">Members ഇല്ല. Add ചെയ്യൂ.</td></tr>';
        return;
      }
      tbody.innerHTML = db.members.map(m => `
        <tr>
          <td>#${m.id}</td>
          <td>${m.name}</td>
          <td>${m.phone}</td>
          <td>₹${m.amount.toLocaleString()}</td>
          <td><span class="badge ${m.paid?'paid':'pending'}">${m.paid?'PAID':'PENDING'}</span></td>
          <td><button class="btn small ${m.paid?'danger':'success'}" onclick="togglePaid(${m.id})">മാറ്റുക</button></td>
        </tr>
      `).join('');
    }

    function togglePaid(id) {
      const m = db.members.find(x => x.id === id);
      m.paid = !m.paid;
      saveDB();
      renderTable();
      updateStats();
    }

    function showAddMember() {
      document.getElementById('addMemberModal').classList.remove('hidden');
    }

    function closeAddMember() {
      document.getElementById('addMemberModal').classList.add('hidden');
    }

    function addMember() {
      const name = document.getElementById('newMemName').value.trim();
      const phone = document.getElementById('newMemPhone').value.trim();
      const amount = parseInt(document.getElementById('newMemAmount').value) || 10000;
      
      if(!name || !phone) return alert('Name & Phone required!');
      
      db.members.push({
        id: db.nextId++,
        name: name,
        phone: phone,
        amount: amount,
        paid: false
      });
      saveDB();
      renderTable();
      updateStats();
      closeAddMember();
      document.getElementById('newMemName').value = '';
      document.getElementById('newMemPhone').value = '';
      document.getElementById('newMemAmount').value = '10000';
    }

    function resetApp() {
      if(confirm('Reset all data?')) {
        localStorage.removeItem('mashoodKuriDB');
        location.reload();
      }
    }
  </script>
</body>
</html>
