<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ചിട്ടി മാനേജ്‌മെന്റ്</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-box" class="container">
        <h2>ലോഗിൻ</h2>
        <input type="text" id="username" placeholder="യൂസർനെയിം">
        <button onclick="login()">ലോഗിൻ ചെയ്യുക</button>
    </div>

    <div id="dashboard" class="container" style="display:none;">
        <h1>ചിട്ടി ഡാഷ്‌ബോർഡ്</h1>
        <input type="text" id="memberName" placeholder="അംഗത്തിന്റെ പേര്">
        <button onclick="addMember()">അംഗത്തെ ചേർക്കുക</button>
        
        <table id="memberTable">
            <tr><th>അംഗങ്ങൾ</th></tr>
        </table>

        <button onclick="runDraw()" class="draw-btn">വിജയിയെ തിരഞ്ഞെടുക്കുക</button>
        <h2 id="winner"></h2>
    </div>

    <script src="script.js"></script>
</body>
</html>
