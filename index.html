<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mashood Chitty - ULTRA FIX</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:sans-serif;background:#f5f7fb;padding-bottom:80px}
.container{max-width:480px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:20px;padding:16px;margin:12px 0;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.btn{background:#2E7D32;color:#fff;border:none;padding:14px;border-radius:30px;width:100%;font-weight:700;margin:6px 0;cursor:pointer;font-size:1rem}
.btn-outline{background:#fff;border:2px solid #2E7D32;color:#2E7D32}
.btn-danger{background:#c62828}
.status{padding:12px;border-radius:12px;text-align:center;font-weight:700;margin-bottom:12px}
.live{background:#d1fae5;color:#065f46}.error{background:#fee2e2;color:#991b1b}.local{background:#fef3c7;color:#92400e}
input,select,textarea{width:100%;padding:14px;border-radius:20px;border:2px solid #ddd;margin:8px 0;font-size:1rem}
.member-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #eee}
#wheelCanvas{width:100%;aspect-ratio:1;border-radius:50%;background:#eee}
.tab-bar{display:flex;gap:4px;background:#fff;border-radius:30px;padding:6px;margin-bottom:12px;overflow:auto}
.tab-bar button{flex:1;padding:10px;border:none;background:transparent;font-weight:700;border-radius:20px}
.tab-bar button.active{background:#2E7D32;color:#fff}
.hidden{display:none!important}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-card{background:#fff;border-radius:20px;padding:20px;width:100%;max-width:360px}
</style>
</head>
<body>
<div class="container">
<div id="status" class="status local">⏳ Loading...</div>
<div style="background:#fff;padding:10px;border-radius:20px;margin-bottom:12px;display:flex;gap:8px;align-items:center">
<strong id="groupName">കുറി 1</strong><span id="memberCountBadge" style="background:#2E7D32;color:#fff;padding:4px 10px;border-radius:20px;font-size:.8rem">0 Members</span>
</div>

<div class="tab-bar">
<button class="active" data-tab="members">Members</button>
<button data-tab="draw">Draw</button>
<button data-tab="pay">Pay</button>
<button data-tab="history">History</button>
</div>

<div id="tab-members" class="tab">
<div class="card"><h3>📋 മെമ്പർമാർ</h3><div id="memberList"></div></div>
<div class="card">
<input id="newName" placeholder="പേര് എഴുതുക (ഉദാ: രമേഷ്)">
<input id="newPhone" placeholder="📱 ഫോൺ (Optional)">
<button class="btn" id="addBtn">✅ ADD MEMBER - ഇപ്പോൾ ചേർക്കുക</button>
<div id="addMsg" style="text-align:center;margin-top:8px;font-weight:700"></div>
</div>
<div class="card">
<button class="btn btn-outline" onclick="makeAllEligible()">✅ എല്ലാവരെയും Eligible ആക്കുക</button>
<button class="btn btn-danger" onclick="clearAll()">🗑 എല്ലാം Delete ചെയ്യുക</button>
</div>
</div>

<div id="tab-draw" class="tab hidden">
<div class="card"><h3>🎰 വീൽ</h3><canvas id="wheelCanvas" width="400" height="400"></canvas><div id="winnerName" style="text-align:center;font-size:2rem;font-weight:800;color:#2E7D32;padding:10px">—</div><button class="btn" id="spinBtn">🎡 SPIN & SELECT WINNER</button></div>
</div>

<div id="tab-pay" class="tab hidden"><div class="card"><h3>💰 Payments</h3><div id="payList"></div></div></div>
<div id="tab-history" class="tab hidden"><div class="card"><h3>📜 Winners</h3><div id="historyList"></div></div></div>

<div class="card" style="background:#e7f3ff"><strong>🔧 Fix Status:</strong><div id="debug" style="font-size:.8rem;margin-top:6px;white-space:pre-wrap"></div>
<button class="btn btn-outline" onclick="testFirebase()">🧪 Firebase Test ചെയ്യുക</button>
<a href="https://console.firebase.google.com/project/mashood-kuri/database/mashood-kuri-default-rtdb/rules" target="_blank" class="btn" style="display:block;text-align:center;text-decoration:none">🔓 Rules True ആക്കാൻ ക്ലിക്ക്</a>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAMgfioVqgKQfOfiPsc1TDlTuWZZyH0Zq0",
  authDomain: "mashood-kuri.firebaseapp.com",
  databaseURL: "https://mashood-kuri-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mashood-kuri",
  storageBucket: "mashood-kuri.firebasestorage.app",
  messagingSenderId: "1016691708150",
  appId: "1:1016691708150:web:02d79ef9ddc5dff3285cd7"
};

let db=null, dbRef=null;
try{
  const app = initializeApp(firebaseConfig);
  db = getDatabase(app);
  dbRef = ref(db, 'mashood_chitty_FINAL_LIVE');
  console.log('Firebase initialized');
}catch(e){ console.error('Firebase init failed', e); }

let data = { members: [], winners: [], eligibility: {}, payments: {} };
let firebaseConnected = false;

function loadLocal(){
  try{
    const local = localStorage.getItem('mashood_chitty_local');
    if(local){
      const parsed = JSON.parse(local);
      if(parsed && parsed.members) {
        data = parsed;
        console.log('Loaded from localStorage', data);
        return true;
      }
    }
  }catch(e){}
  return false;
}

function saveLocal(){
  try{
    localStorage.setItem('mashood_chitty_local', JSON.stringify(data));
    console.log('Saved to localStorage', data.members.length);
    return true;
  }catch(e){ console.error('localStorage save failed', e); return false; }
}

function updateStatus(){
  const s = document.getElementById('status');
  const d = document.getElementById('debug');
  const count = data.members.length;
  document.getElementById('memberCountBadge').textContent = count + ' Members';
  
  let statusText = '';
  if(firebaseConnected){
    statusText = `✅ LIVE - Cloud-ൽ Save ആയി | ${count} members | എല്ലാ ഫോണിലും കാണും`;
    s.className = 'status live';
  }else{
    statusText = `⚠️ LOCAL MODE - ഇപ്പോൾ ഫോണിൽ മാത്രം Save ആയി | ${count} members | Firebase Rules True ആക്കിയാൽ Live ആവും`;
    s.className = 'status local';
  }
  s.textContent = statusText;
  
  d.textContent = `Members: ${JSON.stringify(data.members)}\nFirebase: ${firebaseConnected?'Connected':'Not Connected'}\nLocal: ${loadLocal()?'Found':'Empty'}\nLast Save: ${new Date().toLocaleTimeString()}`;
}

function saveData(){
  // ALWAYS save to local first - this never fails
  saveLocal();
  
  // Try to save to Firebase
  if(dbRef){
    set(dbRef, data).then(()=>{
      firebaseConnected = true;
      updateStatus();
      console.log('Firebase save OK');
    }).catch((err)=>{
      console.error('Firebase save failed', err);
      firebaseConnected = false;
      updateStatus();
      document.getElementById('status').className='status error';
      document.getElementById('status').innerHTML = `❌ Firebase Save Failed: ${err.message}<br>Rules True ആക്കണം: <a href="https://console.firebase.google.com/project/mashood-kuri/database/mashood-kuri-default-rtdb/rules" target="_blank" style="color:white">Click Here</a><br>എന്നാലും Local-ൽ Save ആയിട്ടുണ്ട്!`;
    });
  }else{
    updateStatus();
  }
  renderAll();
}

// Load
loadLocal();
updateStatus();
renderAll();

// Firebase listener
if(dbRef){
  onValue(dbRef, (snap)=>{
    const val = snap.val();
    if(val && val.members && val.members.length > data.members.length){
      // Only overwrite if cloud has more data than local (to avoid losing local when offline)
      if(!loadLocal() || val.members.length >= JSON.parse(localStorage.getItem('mashood_chitty_local')||'{"members":[]}').members.length){
        data = val;
        if(!data.eligibility) data.eligibility={};
        if(!data.winners) data.winners=[];
        if(!data.payments) data.payments={};
        saveLocal();
        console.log('Loaded from Firebase, more data found');
      }
    }else if(val && !loadLocal()){
      data = val;
      if(!data.eligibility) data.eligibility={};
      if(!data.winners) data.winners=[];
      if(!data.payments) data.payments={};
      saveLocal();
    }
    firebaseConnected = true;
    updateStatus();
    renderAll();
    drawWheel(0);
  }, (err)=>{
    console.error('Firebase read error', err);
    firebaseConnected = false;
    updateStatus();
  });
}

function renderAll(){
  const list = document.getElementById('memberList');
  const payList = document.getElementById('payList');
  const histList = document.getElementById('historyList');
  
  if(!data.members.length){
    list.innerHTML='<div style="text-align:center;color:#888;padding:20px">ഇതുവരെ മെമ്പർ ഇല്ല<br>താഴെ പേര് എഴുതി ADD അടിക്കൂ</div>';
  }else{
    let html='';
    data.members.forEach((m,i)=>{
      const elig = data.eligibility[m]!==false;
      html+=`<div class="member-row"><span>${i+1}. ${m} ${elig?'✅':'❌'}</span><div><button onclick="toggleElig('${m}')" style="padding:4px 8px;border-radius:10px;border:1px solid #ddd;background:${elig?'#d1fae5':'#fee2e2'}">${elig?'Eligible':'Ineligible'}</button><button onclick="deleteMember('${m}')" style="margin-left:6px;color:#c62828;border:none;background:none;font-size:1.2rem">✕</button></div></div>`;
    });
    list.innerHTML=html;
  }
  
  // Payments
  let phtml='';
  data.members.forEach(m=>{
    const paid = data.payments[m]||false;
    phtml+=`<div class="member-row"><span>${m}</span><span onclick="togglePay('${m}')" style="cursor:pointer;background:${paid?'#d1fae5':'#fee2e2'};padding:4px 10px;border-radius:20px">${paid?'Paid':'Pending'}</span></div>`;
  });
  payList.innerHTML=phtml||'ഇല്ല';
  
  // History
  let hhtml='';
  data.winners.slice().reverse().forEach(w=>{ hhtml+=`<div class="member-row"><span>${w}</span><span>${new Date().toLocaleDateString()}</span></div>`; });
  histList.innerHTML=hhtml||'ഇല്ല';
  
  updateStatus();
  drawWheel(window.currentRot||0);
}

window.toggleElig = function(m){
  data.eligibility[m] = !data.eligibility[m];
  saveData();
}
window.deleteMember = function(m){
  if(!confirm(m+' Delete ചെയ്യണോ?')) return;
  data.members = data.members.filter(x=>x!==m);
  delete data.eligibility[m];
  delete data.payments[m];
  saveData();
}
window.togglePay = function(m){
  data.payments[m] = !data.payments[m];
  saveData();
}
window.makeAllEligible = function(){
  data.members.forEach(m=>data.eligibility[m]=true);
  saveData();
  alert('എല്ലാവരും Eligible ആയി!');
}
window.clearAll = function(){
  if(!confirm('എല്ലാ Members Delete ചെയ്യണോ?')) return;
  data = { members: [], winners: [], eligibility: {}, payments: {} };
  saveData();
}

document.getElementById('addBtn').addEventListener('click', function(){
  const nameInput = document.getElementById('newName');
  const phoneInput = document.getElementById('newPhone');
  const msg = document.getElementById('addMsg');
  const name = nameInput.value.trim();
  
  if(!name){
    msg.style.color='#c62828';
    msg.textContent='❌ പേര് എഴുതൂ!';
    nameInput.style.borderColor='#c62828';
    return;
  }
  if(data.members.includes(name)){
    msg.style.color='#c62828';
    msg.textContent='❌ '+name+' നേരത്തെ ഉണ്ട്!';
    return;
  }
  
  // ADD NOW - No waiting for Firebase
  data.members.push(name);
  data.eligibility[name]=true;
  data.payments[name]=false;
  
  // Save immediately
  saveData();
  
  // Clear and show success
  nameInput.value='';
  phoneInput.value='';
  msg.style.color='#2E7D32';
  msg.textContent='✅ '+name+' Added! Total: '+data.members.length;
  nameInput.style.borderColor='#ddd';
  
  setTimeout(()=>{ msg.textContent=''; },3000);
  
  console.log('Member added:', name, 'Total:', data.members.length);
});

window.testFirebase = function(){
  if(!dbRef){ alert('Firebase Init Failed'); return; }
  set(dbRef, data).then(()=>{ alert('✅ Firebase Working! ഇനി എല്ലാ ഫോണിലും Live ആവും'); firebaseConnected=true; updateStatus(); }).catch((e)=>{ alert('❌ Firebase Failed: '+e.message+'\n\nRules True ആക്കുക:\nhttps://console.firebase.google.com/project/mashood-kuri/database/mashood-kuri-default-rtdb/rules'); });
}

function drawWheel(rot){
  const canvas=document.getElementById('wheelCanvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const w=canvas.width,cx=w/2,r=w/2-10;
  ctx.clearRect(0,0,w,w);
  const eligible = data.members.filter(m=>data.eligibility[m]!==false);
  const members = eligible.length?eligible:data.members;
  if(!members.length){ ctx.fillStyle='#888'; ctx.font='20px sans-serif'; ctx.textAlign='center'; ctx.fillText('No members - Add ചെയ്യുക',cx,cx); return; }
  const seg=(Math.PI*2)/members.length;
  const colors=['#e63946','#f4a261','#2a9d8f','#264653','#e9c46a'];
  members.forEach((m,i)=>{
    const s=i*seg+rot, e=s+seg;
    ctx.beginPath(); ctx.moveTo(cx,cx); ctx.arc(cx,cx,r,s,e); ctx.closePath();
    ctx.fillStyle=colors[i%colors.length]; ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.stroke();
    ctx.save(); ctx.translate(cx,cx); ctx.rotate(s+seg/2); ctx.textAlign='center'; ctx.fillStyle='#fff'; ctx.font='bold 12px sans-serif';
    ctx.fillText(m.length>8?m.substring(0,6)+'..':m,r*0.6,4); ctx.restore();
  });
}

document.getElementById('spinBtn').addEventListener('click', function(){
  const eligible = data.members.filter(m=>data.eligibility[m]!==false);
  const members = eligible.length?eligible:data.members;
  if(!members.length) return alert('Member ഇല്ല');
  const winner = members[Math.floor(Math.random()*members.length)];
  document.getElementById('winnerName').textContent='🎉 '+winner+' 🎉';
  data.winners.push(winner);
  saveData();
});

document.querySelectorAll('.tab-bar button').forEach(b=>{
  b.addEventListener('click', function(){
    document.querySelectorAll('.tab-bar button').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');
    document.querySelectorAll('.tab').forEach(x=>x.classList.add('hidden'));
    document.getElementById('tab-'+this.dataset.tab).classList.remove('hidden');
    if(this.dataset.tab==='draw') drawWheel(window.currentRot||0);
  });
});

window.currentRot=0;
drawWheel(0);
updateStatus();
</script>
</body>
</html>
